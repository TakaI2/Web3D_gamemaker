<!DOCTYPE html>
<html lang="ja">
<head>
  <title>Flow Editor — ゲームフロー編集</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #14161f; font-family: system-ui, sans-serif; color: #ddd; font-size: 12px; }
    #topbar { position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 30; display: flex; align-items: center; gap: 8px; padding: 0 10px; background: rgba(12,14,22,0.96); border-bottom: 1px solid rgba(255,255,255,0.12); }
    #topbar a, #topbar button, #topbar select, #topbar input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.22); color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; text-decoration: none; }
    #topbar input { cursor: text; }
    #topbar .prim { border-color: #6cf; color: #aef; }
    #topbar .spacer { flex: 1; }
    #main { position: fixed; top: 44px; left: 0; right: 260px; bottom: 0; }
    #canvas { position: absolute; inset: 0; overflow: hidden; background:
      radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px) 0 0 / 24px 24px, #181b26; cursor: grab; }
    #world { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
    #edges { position: absolute; left: 0; top: 0; width: 1px; height: 1px; overflow: visible; pointer-events: none; }
    .node { position: absolute; width: 160px; background: #232838; border: 1px solid #3a4256; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); user-select: none; }
    .node.sel { border-color: #6cf; box-shadow: 0 0 0 2px rgba(102,204,255,0.4); }
    .node .hd { padding: 5px 8px; border-radius: 6px 6px 0 0; font-weight: 700; cursor: move; display: flex; justify-content: space-between; }
    .node .hd .nid { font-weight: 400; color: rgba(255,255,255,0.6); font-size: 10px; }
    .node.start .hd { background: #2e4d2e; color: #bfe; }
    .node.story .hd { background: #2e2e52; color: #cdf; }
    .node.battle .hd { background: #52302e; color: #fcc; }
    .node.end .hd { background: #4a2e44; color: #fce; }
    .node .bd { padding: 6px 8px; min-height: 22px; color: #bcc; font-size: 11px; word-break: break-all; }
    .port { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: #8ab; border: 2px solid #14161f; cursor: crosshair; }
    .port.in { left: -7px; top: 28px; }
    .port.out { right: -7px; }
    .port-label { position: absolute; right: 12px; font-size: 9px; color: #9ab; }
    #right { position: fixed; top: 44px; right: 0; bottom: 0; width: 260px; background: rgba(16,18,28,0.95); border-left: 1px solid rgba(255,255,255,0.12); overflow-y: auto; padding: 10px; }
    h4 { margin: 10px 0 6px; font-size: 11px; color: #9fd0ff; text-transform: uppercase; }
    h4:first-child { margin-top: 0; }
    .row { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
    .row label { color: #aab; min-width: 64px; }
    .row input[type=text], .row input[type=number], .row select { flex: 1; min-width: 0; background: #222; color: #ddd; border: 1px solid #3a3a60; border-radius: 3px; padding: 3px 5px; }
    .chk { display: flex; align-items: center; gap: 5px; margin: 2px 0; }
    button.act { background: #202040; color: #ccd; border: 1px solid #3a3a60; border-radius: 4px; cursor: pointer; padding: 5px 8px; width: 100%; margin: 4px 0; }
    button.act:hover { background: #2a2a58; }
    button.danger { border-color: #a55; color: #fbb; }
    #toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(30,30,60,0.92); color: #eee; padding: 6px 16px; border-radius: 6px; z-index: 50; opacity: 0; transition: opacity .3s; pointer-events: none; }
    #toast.show { opacity: 1; }
    .hint { color: #778; font-size: 10px; margin-top: 4px; line-height: 1.5; }
  </style>
</head>
<body>
  <div id="topbar">
    <a href="../hub/">← 一覧</a>
    <select id="flow-select" title="public/flow/ から読込"></select>
    <button id="btn-new">新規</button>
    <span style="color:#778">ID</span><input id="flow-id" type="text" style="width:90px">
    <span style="color:#778">タイトル</span><input id="flow-title" type="text" style="width:130px">
    <select id="node-picker" title="追加するノード"></select>
    <button id="btn-add">＋ノード</button>
    <span class="spacer"></span>
    <a href="../flow-player/" title="プレイヤーで再生">▶ 再生</a>
    <button id="btn-save" class="prim">保存</button>
  </div>

  <div id="main">
    <div id="canvas"><div id="world"><svg id="edges"></svg></div></div>
  </div>

  <div id="right">
    <h4 id="prop-title">ノード未選択</h4>
    <div id="prop-panel"></div>
  </div>

  <div id="toast"></div>
  <script type="module" src="./flow-editor.js"></script>
</body>
</html>
