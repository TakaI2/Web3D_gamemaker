<!DOCTYPE html>
<html lang="ja">
<head>
  <title>Swing Catch — 振り回しキャッチ</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: sans-serif;
    }
    #app { width: 100%; height: 100%; }

    #ui {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 30;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 12px 16px;
      color: #ddd;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 210px;
    }
    #ui h3 { margin: 0 0 4px; font-size: 14px; color: #fff; }
    .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .ui-row label { flex-shrink: 0; }
    .ui-row input[type=range] { flex: 1; accent-color: #5580cc; }
    .val { color: #adf; font-size: 11px; min-width: 34px; text-align: right; }

    #back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 30;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
    }
    #back-btn:hover { background: rgba(0,0,0,0.75); }

    #fps-counter {
      position: fixed;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      font-family: monospace;
      pointer-events: none;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
      color: rgba(255,255,255,0.9);
      font-size: 22px;
      line-height: 1;
      text-shadow: 0 0 3px rgba(0,0,0,0.8);
      transition: color 0.1s, transform 0.1s;
    }
    #crosshair.grabbing { color: #ffd24a; transform: translate(-50%, -50%) scale(1.3); }

    #lock-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #fff;
      pointer-events: none;
      text-align: center;
    }
    #lock-overlay h2 { margin: 0; font-size: 24px; }
    #lock-overlay p  { margin: 0; color: #ccc; font-size: 13px; line-height: 1.7; }
    .key-hint {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: monospace;
      font-size: 13px;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      z-index: 50;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #error-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #111;
      color: #fff;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      padding: 24px;
      z-index: 100;
    }
    #error-msg.visible { display: flex; }
    #error-msg h2 { margin: 0; color: #f66; }
  </style>
</head>
<body>
  <div id="app"></div>
  <a id="back-btn" href="../">← 戻る</a>

  <div id="ui">
    <h3>Swing Catch</h3>
    <div class="ui-row">
      <label>Objects</label>
      <input type="range" id="obj-count" min="1" max="16" step="1" value="8">
      <span class="val" id="obj-count-val">8</span>
    </div>
    <div class="ui-row">
      <label>Stiffness</label>
      <input type="range" id="stiffness" min="10" max="150" step="1" value="60">
      <span class="val" id="stiffness-val">60</span>
    </div>
    <div class="ui-row">
      <label>Damping</label>
      <input type="range" id="damping" min="0" max="20" step="0.5" value="6">
      <span class="val" id="damping-val">6.0</span>
    </div>
    <div class="ui-row">
      <label>Throw ×</label>
      <input type="range" id="release-boost" min="1" max="3" step="0.1" value="1.0">
      <span class="val" id="release-boost-val">1.0</span>
    </div>
    <div class="ui-row">
      <label>Shot Spd</label>
      <input type="range" id="proj-speed" min="15" max="80" step="1" value="40">
      <span class="val" id="proj-speed-val">40</span>
    </div>
    <div class="ui-row">
      <label>Impulse</label>
      <input type="range" id="impulse" min="5" max="40" step="1" value="18">
      <span class="val" id="impulse-val">18</span>
    </div>
    <div class="ui-row">
      <label>Bounce</label>
      <input type="range" id="restitution" min="0.5" max="1" step="0.01" value="0.92">
      <span class="val" id="restitution-val">0.92</span>
    </div>
  </div>

  <div id="crosshair">+</div>
  <div id="fps-counter">-- FPS</div>

  <div id="lock-overlay">
    <h2>Swing Catch — 振り回しキャッチ</h2>
    <p>クリックしてマウスをキャプチャ &nbsp;|&nbsp; ESC で解放</p>
    <p>
      <span class="key-hint">W A S D</span> 移動 &nbsp;
      <span class="key-hint">Space</span> ジャンプ &nbsp;
      <span class="key-hint">マウス</span> 視点
    </p>
    <p>
      <span class="key-hint">左クリック（押しっぱ）</span> キャッチ＆振り回し → 離すと投げる<br>
      <span class="key-hint">右クリック</span> 球を発射してオブジェクトを吹っ飛ばす
    </p>
  </div>

  <div id="loading">読み込み中...</div>

  <div id="error-msg">
    <h2>初期化に失敗しました</h2>
    <p>Chrome または Edge の最新版 (WebGPU 対応) でお試しください。</p>
    <p id="error-detail" style="font-size:12px;color:#aaa;"></p>
  </div>

  <script type="module" src="./swing-catch.js"></script>
</body>
</html>
