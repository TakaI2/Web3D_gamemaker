<!DOCTYPE html>
<html lang="ja">
<head>
  <title>Story Player — 3D ストーリー再生</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0c14; font-family: system-ui, sans-serif; color: #ddd; }
    #app { position: fixed; inset: 0; }
    #topbar { position: fixed; top: 8px; left: 8px; z-index: 40; display: flex; gap: 8px; align-items: center; }
    #topbar a, #topbar select, #topbar button { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; text-decoration: none; }
    #start-overlay { position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); cursor: pointer; }
    #start-overlay .box { text-align: center; }
    #start-overlay h1 { font-size: 20px; margin: 0 0 8px; }
    #start-overlay p { font-size: 13px; color: #bcd; }
    #loading { position: fixed; inset: 0; z-index: 70; display: flex; align-items: center; justify-content: center; background: #0a0c14; transition: opacity .4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #error-msg { position: fixed; inset: 0; z-index: 80; display: none; align-items: center; justify-content: center; background: rgba(20,0,0,0.85); padding: 24px; text-align: center; }
    #error-msg.visible { display: flex; }
    #error-detail { color: #fbb; font-size: 12px; margin-top: 8px; max-width: 600px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="topbar">
    <a href="../hub/">← 一覧</a>
    <select id="story-select" title="public/story/ から読込"></select>
    <a href="../story-editor/" title="ストーリーエディタ">✎ 編集</a>
  </div>

  <div id="start-overlay" style="display:none">
    <div class="box">
      <h1 id="start-title">ストーリー</h1>
      <p>クリックまたは Space で開始（以降クリック/Space で送り）</p>
    </div>
  </div>

  <div id="loading"><div>読み込み中…</div></div>
  <div id="error-msg"><div><div>エラーが発生しました</div><div id="error-detail"></div></div></div>

  <script type="module" src="./story-player.js"></script>
</body>
</html>
