<!DOCTYPE html>
<html lang="ja">
<head>
  <title>TPS Flight — サイキッカー空中アクション</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: sans-serif; }
    #app { width: 100%; height: 100%; }

    #ui {
      position: fixed; top: 12px; right: 12px; z-index: 30;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 12px 16px; color: #ddd; font-size: 13px;
      display: flex; flex-direction: column; gap: 9px; min-width: 220px;
    }
    #ui h3 { margin: 0 0 4px; font-size: 14px; color: #fff; }
    #ui .sec { font-size: 10px; color: #88a; text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }
    .ui-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .ui-row label { flex-shrink: 0; min-width: 56px; }
    .ui-row input[type=range] { flex: 1; accent-color: #5580cc; }
    .val { color: #adf; font-size: 11px; min-width: 38px; text-align: right; }

    #back-btn {
      position: fixed; top: 12px; left: 12px; z-index: 30;
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 6px 14px; border-radius: 4px; font-size: 13px; cursor: pointer; text-decoration: none;
    }
    #back-btn:hover { background: rgba(0,0,0,0.75); }

    #fps-counter { position: fixed; bottom: 12px; left: 12px; z-index: 10; color: rgba(255,255,255,0.8); font-size: 14px; font-family: monospace; pointer-events: none; }

    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none;
      color: rgba(255,255,255,0.85); font-size: 20px; line-height: 1; text-shadow: 0 0 3px rgba(0,0,0,0.8);
      transition: color 0.1s, transform 0.1s;
    }
    #crosshair.grabbing { color: #ffd24a; transform: translate(-50%, -50%) scale(1.3); }

    #lock-overlay {
      position: fixed; inset: 0; z-index: 20; background: rgba(0,0,0,0.55);
      display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      color: #fff; pointer-events: none; text-align: center;
    }
    #lock-overlay h2 { margin: 0; font-size: 24px; }
    #lock-overlay p  { margin: 0; color: #ccc; font-size: 13px; line-height: 1.7; }
    .key-hint { display: inline-block; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; padding: 2px 8px; font-family: monospace; font-size: 13px; }

    #loading { position: fixed; inset: 0; background: #1a1a2e; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 50; transition: opacity 0.4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #error-msg { display: none; position: fixed; inset: 0; background: #111; color: #fff; align-items: center; justify-content: center; flex-direction: column; gap: 12px; text-align: center; padding: 24px; z-index: 100; }
    #error-msg.visible { display: flex; }
    #error-msg h2 { margin: 0; color: #f66; }
  </style>
</head>
<body>
  <div id="app"></div>
  <a id="back-btn" href="../hub/">← 戻る</a>

  <div id="ui">
    <h3>TPS Flight</h3>
    <div class="ui-row"><label>キャラ</label><select id="npc-select" style="flex:1;background:#16162c;color:#ccd;border:1px solid #3a3a60;border-radius:4px;padding:2px 5px;font-size:12px;"></select></div>
    <div class="sec">カメラ</div>
    <div class="ui-row"><label>距離</label><input type="range" id="cam-dist" min="1.5" max="8" step="0.1" value="4"><span class="val" id="cam-dist-val">4.0</span></div>
    <div class="ui-row"><label>高さ</label><input type="range" id="cam-height" min="0" max="2.5" step="0.05" value="1.2"><span class="val" id="cam-height-val">1.2</span></div>
    <div class="ui-row"><label>追従</label><input type="range" id="cam-follow" min="2" max="20" step="0.5" value="8"><span class="val" id="cam-follow-val">8.0</span></div>
    <div class="ui-row"><label>FOV</label><input type="range" id="cam-fov" min="45" max="95" step="1" value="70"><span class="val" id="cam-fov-val">70</span></div>
    <div class="ui-row"><label>感度</label><input type="range" id="cam-sens" min="0.5" max="3" step="0.1" value="1.0"><span class="val" id="cam-sens-val">1.0</span></div>
    <div class="sec">飛行</div>
    <div class="ui-row"><label>速度</label><input type="range" id="fly-speed" min="3" max="30" step="1" value="9"><span class="val" id="fly-speed-val">9</span></div>
    <div class="ui-row"><label>Objects</label><input type="range" id="obj-count" min="0" max="16" step="1" value="8"><span class="val" id="obj-count-val">8</span></div>
    <div class="ui-row"><label>一般人</label><input type="range" id="mob-count" min="0" max="8" step="1" value="4"><span class="val" id="mob-count-val">4</span></div>
    <div class="ui-row"><label>接地判定</label><input type="range" id="prey-ground-y" min="0.05" max="1.5" step="0.05" value="0.25"><span class="val" id="prey-ground-y-val">0.25</span></div>
    <div class="ui-row"><label>捕食待ち</label><input type="range" id="prey-ground-time" min="0" max="3" step="0.1" value="0.7"><span class="val" id="prey-ground-time-val">0.7</span></div>
    <div class="ui-row"><label>捕食時間</label><input type="range" id="eat-time" min="1" max="12" step="0.5" value="4.5"><span class="val" id="eat-time-val">4.5</span></div>
  </div>

  <div id="crosshair">+</div>
  <div id="fps-counter">-- FPS</div>

  <div id="lock-overlay">
    <h2>TPS Flight — サイキッカー空中アクション</h2>
    <p>クリックしてマウスをキャプチャ &nbsp;|&nbsp; ESC で解放</p>
    <p>
      <span class="key-hint">W A S D</span> 移動（前進＝視線方向） &nbsp;
      <span class="key-hint">マウス</span> カメラ旋回（上下で高度）
    </p>
    <p>
      <span class="key-hint">左クリック（押しっぱ）</span> 引き寄せ（目の前に吸着）<br>
      <span class="key-hint">右クリック</span> ショット（抱えた物を射出）
    </p>
  </div>

  <div id="loading">読み込み中...</div>

  <div id="error-msg">
    <h2>初期化に失敗しました</h2>
    <p>Chrome または Edge の最新版 (WebGPU 対応) でお試しください。</p>
    <p id="error-detail" style="font-size:12px;color:#aaa;"></p>
  </div>

  <script type="module" src="./tps-flight.js"></script>
</body>
</html>
