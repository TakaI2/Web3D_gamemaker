<!DOCTYPE html>
<html lang="ja">
<head>
  <title>FX Preview — パーティクル検証(WebGPU)</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0e0e14; font-family: sans-serif; }
    #app { width: 100%; height: 100%; }

    #ui {
      position: fixed; top: 12px; right: 12px; z-index: 30;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 12px 14px; color: #ddd; font-size: 13px;
      display: flex; flex-direction: column; gap: 8px; min-width: 180px;
    }
    #ui h3 { margin: 0 0 4px; font-size: 14px; color: #fff; }
    #ui button {
      background: #2a3550; color: #dfe6ff; border: 1px solid #46568a;
      border-radius: 5px; padding: 6px 8px; font-size: 12px; cursor: pointer;
    }
    #ui button:hover { background: #34416a; }
    .hint { color: #9aa; font-size: 11px; line-height: 1.5; }

    #back-btn {
      position: fixed; top: 12px; left: 12px; z-index: 30;
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 6px 14px; border-radius: 4px; font-size: 13px;
      cursor: pointer; text-decoration: none;
    }
    #back-btn:hover { background: rgba(0,0,0,0.75); }

    #fps-counter {
      position: fixed; bottom: 12px; left: 12px; z-index: 10;
      color: rgba(255,255,255,0.8); font-size: 14px; font-family: monospace; pointer-events: none;
    }
    #count { color:#adf; }

    #error-msg {
      display: none; position: fixed; inset: 0; background: #111; color: #fff;
      align-items: center; justify-content: center; flex-direction: column; gap: 12px;
      text-align: center; padding: 24px; z-index: 100;
    }
    #error-msg.visible { display: flex; }
    #error-msg h2 { margin: 0; color: #f66; }
  </style>
</head>
<body>
  <div id="app"></div>
  <a id="back-btn" href="../hub/">← 戻る</a>

  <div id="ui">
    <h3>FX Preview</h3>
    <button id="btn-fire">炎 fire</button>
    <button id="btn-frost">氷オーラ frost</button>
    <button id="btn-smoke">煙 smoke</button>
    <button id="btn-burst">スパーク burst（クリックでも）</button>
    <button id="btn-stress">負荷テスト（×20連続burst）</button>
    <div class="hint">ドラッグで回転 / ホイールでズーム<br>画面クリックでスパーク発生</div>
  </div>

  <div id="fps-counter">-- FPS / 粒 <span id="count">0</span></div>

  <div id="error-msg">
    <h2>初期化に失敗しました</h2>
    <p>Chrome または Edge の最新版 (WebGPU 対応) でお試しください。</p>
    <p id="error-detail" style="font-size:12px;color:#aaa;"></p>
  </div>

  <script type="module" src="./fx-preview.js"></script>
</body>
</html>
