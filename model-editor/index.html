<!DOCTYPE html>
<html lang="ja">
<head>
  <title>Model Editor — GLB 選択</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #161a26; color: #e6ecf5; font-family: system-ui, sans-serif; }
    #topbar { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #1c2233; border-bottom: 1px solid #2a3450; }
    #topbar a, #topbar button { background: rgba(255,255,255,0.06); border: 1px solid #3a4660; color: #fff; padding: 7px 14px; border-radius: 5px; font-size: 13px; cursor: pointer; text-decoration: none; }
    #topbar button.prim { border-color: #6cf; color: #aef; }
    #topbar .sp { flex: 1; }
    #status { font-size: 12px; color: #9fb0c8; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding: 14px; }
    .cell { background: #1f2638; border: 1px solid #2c3650; border-radius: 8px; padding: 8px; cursor: pointer; transition: border-color .12s, background .12s; }
    .cell:hover { border-color: #5580cc; }
    .cell.sel { border-color: #6cf; background: #1c3040; }
    .cell img { width: 100%; height: 130px; object-fit: contain; background: #222a38; border-radius: 5px; display: block; }
    .cell .row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .cell .name { font-size: 11px; color: #cdd6e4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(30,40,70,0.95); color: #eef; padding: 7px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity .3s; }
    #toast.show { opacity: 1; }
    #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 50; }
    #modal.show { display: flex; }
    .modal-body { background: #1c2233; border: 1px solid #3a4660; border-radius: 10px; display: flex; gap: 14px; padding: 16px; }
    #modal-canvas { width: 560px; height: 460px; background: #222a38; border-radius: 8px; overflow: hidden; }
    #modal-canvas canvas { display: block; }
    .modal-side { width: 230px; display: flex; flex-direction: column; gap: 12px; }
    #modal-name { font-size: 15px; font-weight: 600; }
    .modal-side label { font-size: 13px; color: #cdd6e4; }
    .modal-side input[type=range] { width: 100%; accent-color: #6cf; }
    .modal-side .hint { font-size: 11px; color: #8fa3bf; line-height: 1.6; }
    .modal-side button { background: rgba(255,255,255,0.06); border: 1px solid #3a4660; color: #fff; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 13px; }
    .modal-side button.prim { border-color: #6cf; color: #aef; }
  </style>
</head>
<body>
  <div id="topbar">
    <a href="../hub/">← 一覧</a>
    <button id="btn-all">全選択</button>
    <button id="btn-none">全解除</button>
    <span id="status">読み込み中…</span>
    <span class="sp"></span>
    <button id="btn-save" class="prim">選択を保存（ゲームに反映）</button>
  </div>
  <div id="grid"></div>
  <div id="toast"></div>

  <div id="modal">
    <div class="modal-body">
      <div id="modal-canvas"></div>
      <div class="modal-side">
        <div id="modal-name"></div>
        <label>サイズ（最大寸法） <span id="size-val">–</span> m</label>
        <input type="range" id="size-range" min="0.2" max="12" step="0.1" value="1.5">
        <div class="hint">左の VRoid（約1.6m）と見比べてスケールを調整してください。値はゲームに反映されます（ドラッグで視点回転）。</div>
        <button id="modal-ok" class="prim">この大きさで決定</button>
        <button id="modal-close">閉じる</button>
      </div>
    </div>
  </div>
  <script type="module" src="./model-editor.js"></script>
</body>
</html>
