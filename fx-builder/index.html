<!DOCTYPE html>
<html lang="ja">
<head>
  <title>FX Builder — エフェクト・プリセット作成</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; color: #ddd; font-family: system-ui, sans-serif; font-size: 13px; }
    body { display: flex; flex-direction: column; height: 100vh; }

    #toolbar { flex-shrink: 0; height: 44px; background: #0e0e1e; border-bottom: 1px solid #2a2a44; display: flex; align-items: center; gap: 6px; padding: 0 10px; }
    #toolbar .sep { width: 1px; height: 20px; background: #333; margin: 0 2px; }
    #toolbar span.fps { font-size: 11px; color: #0f0; margin-left: auto; }

    #main { flex: 1; display: flex; overflow: hidden; min-height: 0; }
    #app { flex: 0 0 64%; position: relative; overflow: hidden; }
    #app canvas { display: block; }
    #fps-counter { position: absolute; top: 6px; left: 6px; font-size: 11px; color: #0f0; background: rgba(0,0,0,.6); padding: 2px 7px; border-radius: 3px; pointer-events: none; z-index: 5; }
    #webgpu-warning { display: none; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); background: #604010; border: 1px solid #a06020; color: #ffc; padding: 4px 14px; border-radius: 4px; font-size: 12px; z-index: 5; }

    #right-panel { flex: 0 0 36%; background: #111325; border-left: 1px solid #2a2a44; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
    .sec { background: #0d0f22; border: 1px solid #252540; border-radius: 6px; padding: 8px; }
    .sec h3 { font-size: 10px; color: #556; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 7px; }
    .row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .row label { font-size: 11px; color: #888; min-width: 64px; }
    .row input[type=range] { flex: 1; cursor: pointer; accent-color: #5580cc; }
    .row .val { font-size: 11px; color: #bbb; min-width: 36px; text-align: right; }
    .row-wrap { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; margin-bottom: 4px; }

    button { padding: 4px 9px; background: #202040; color: #ccd; border: 1px solid #3a3a60; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    button:hover { background: #2a2a58; }
    button:disabled { opacity: 0.38; cursor: default; }
    select, input[type=text], input[type=number] { background: #16162c; color: #ccc; border: 1px solid #3a3a60; border-radius: 3px; padding: 3px 6px; font-size: 12px; }
    input[type=number] { width: 56px; }
    input[type=checkbox] { cursor: pointer; accent-color: #5580cc; }
    input[type=color] { width: 38px; height: 22px; padding: 0; border: 1px solid #3a3a60; background: #16162c; cursor: pointer; }

    #layer-list { display: flex; flex-direction: column; gap: 3px; max-height: 170px; overflow-y: auto; margin-bottom: 6px; }
    .layer-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; cursor: pointer; background: #14162e; border: 1px solid #24264a; }
    .layer-item:hover { background: #1b1d3a; }
    .layer-item.sel { background: #243a64; border-color: #4a6aa0; }
    .layer-item .nm { flex: 1; font-size: 11px; color: #cdd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .layer-item .tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; }
    .tag.mesh { background: #244; color: #9dd; }
    .tag.particle { background: #424; color: #d9d; }

    #toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #282844; color: #eee; padding: 6px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity .3s; z-index: 200; pointer-events: none; white-space: nowrap; }
    #toast.visible { opacity: 1; }
    #toast.error { background: #581818; color: #faa; }
    #toast.warn { background: #583800; color: #fca; }
    #loading { position: fixed; inset: 0; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #99a; z-index: 300; transition: opacity .4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="toolbar">
  <label style="font-size:11px;color:#888;">名前</label>
  <input type="text" id="preset-name" value="new_effect" style="width:130px;">
  <button id="btn-save" title="public/fx に保存">保存</button>
  <select id="load-select" title="public/fx から読込" style="max-width:160px;"><option value="">-- 読込 (fx) --</option></select>
  <div class="sep"></div>
  <button id="btn-fire" title="単発（バースト）を1回発生させて試す">▶ 発射(テスト)</button>
  <label style="font-size:11px;color:#888;display:flex;align-items:center;gap:3px;cursor:pointer;"><input type="checkbox" id="cb-continuous" checked>連続</label>
  <div class="sep"></div>
  <button id="btn-new">新規</button>
  <a href="../fx-editor/" style="padding:4px 9px;background:#203040;color:#bdf;border:1px solid #3a5a8a;border-radius:4px;text-decoration:none;font-size:12px;">FXエディタ ↗</a>
  <span class="fps" id="fps-toolbar">-- FPS</span>
</div>

<div id="main">
  <div id="app">
    <div id="fps-counter">-- FPS</div>
    <div id="webgpu-warning">⚠ WebGPU非対応</div>
  </div>

  <div id="right-panel">
    <div class="sec">
      <h3>レイヤー（重ね順）</h3>
      <div id="layer-list"></div>
      <div class="row-wrap">
        <button id="btn-add-mesh">＋メッシュ</button>
        <button id="btn-add-particle">＋粒子</button>
        <button id="btn-add-tornado">＋トルネード</button>
        <button id="btn-add-tsl">＋TSL</button>
      </div>
      <div class="row-wrap">
        <button id="btn-dup-layer">複製</button>
        <button id="btn-del-layer">削除</button>
        <button id="btn-up-layer">▲</button>
        <button id="btn-down-layer">▼</button>
      </div>
      <div class="row" style="margin-top:4px;">
        <label style="min-width:auto;">既存から</label>
        <select id="import-base" style="flex:1">
          <option value="">-- 取り込んで編集 --</option>
          <option value="tornado">🌪 tornado（竜巻）</option>
          <option value="fire">🔥 fire（炎）</option>
          <option value="smoke">💨 smoke（煙）</option>
          <option value="spark">✨ spark（火花）</option>
          <option value="frost">❄ frost（冷気）</option>
        </select>
      </div>
    </div>

    <div class="sec">
      <h3>選択レイヤー</h3>
      <div id="layer-editor"></div>
    </div>

    <div class="sec">
      <h3>ブルーム（発光）</h3>
      <div class="row"><label>Strength</label><input type="range" id="bloom-strength" min="0" max="5" step="0.05" value="1.2"><span class="val" id="bloom-strength-val">1.20</span></div>
      <div class="row"><label>Radius</label><input type="range" id="bloom-radius" min="0" max="1" step="0.01" value="0.2"><span class="val" id="bloom-radius-val">0.20</span></div>
      <div class="row"><label>Threshold</label><input type="range" id="bloom-threshold" min="0" max="2" step="0.01" value="0.6"><span class="val" id="bloom-threshold-val">0.60</span></div>
    </div>
  </div>
</div>

<input type="file" id="tex-file" accept="image/*" style="display:none">
<div id="toast"></div>
<div id="loading">読み込み中…</div>

<script type="module" src="./fx-builder.js"></script>
</body>
</html>
